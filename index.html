<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>SalTo Pocket</title>

  <link
  rel="manifest"
  href="manifest.json"
/>

<meta
  name="theme-color"
  content="#df2b29"
/>

<link
  rel="apple-touch-icon"
  href="images/icon-192.png"
/>

<meta
  name="apple-mobile-web-app-capable"
  content="yes"
/>

<meta
  name="apple-mobile-web-app-status-bar-style"
  content="default"
/>

<meta
  name="apple-mobile-web-app-title"
  content="SalTo Pocket"
/>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- =========================
       TOPBAR
  ========================== -->

  <header class="topbar">

    <div class="top-title">

      <h1>SalTo Pocket</h1>

      <p>
        Your survival kit for the Salone.
      </p>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

      <input
        type="text"
        id="searchInput"
        placeholder="Cerca editore, stand, categoria..."
      />

      <button
        id="clearSearchBtn"
      >
        ✕
      </button>

    </div>

    <!-- QUICK PADS -->

    <div class="quick-pads">

      <button
        class="quick-btn"
        data-pad="PAD 1"
        onclick="quickSearch('PAD 1', this)"
      >
        PAD 1
      </button>

      <button
        class="quick-btn"
        data-pad="PAD 2"
        onclick="quickSearch('PAD 2', this)"
      >
        PAD 2
      </button>

      <button
        class="quick-btn"
        data-pad="PAD 3"
        onclick="quickSearch('PAD 3', this)"
      >
        PAD 3
      </button>

      <button
        class="quick-btn"
        data-pad="PAD OVAL"
        onclick="quickSearch('PAD OVAL', this)"
      >
        OVAL
      </button>

    </div>

    <!-- FILTERS -->

    <div class="filters">

      <button
        id="allBtn"
        class="filter-btn active"
      >
        Tutti
      </button>

      <button
        id="favoritesBtn"
        class="filter-btn"
      >
        ❤️ Preferiti
      </button>

      <button
        id="visitedBtn"
        class="filter-btn"
      >
        ✅ Visitati
      </button>

    </div>

    <!-- COUNTERS -->

    <div class="counters">

      <div class="counter-card">

        <span id="favoritesCount">
          0
        </span>

        <p>Preferiti</p>

      </div>

      <div class="counter-card">

        <span id="visitedCount">
          0
        </span>

        <p>Visitati</p>

      </div>

    </div>

    <!-- SORT -->

    <div id="sortWrapper">

      <select id="sortSelect">

        <option value="name">
          Ordina: Nome
        </option>

        <option value="stand">
          Ordina: Stand
        </option>

      </select>

    </div>

  </header>

  <!-- =========================
       MAIN
  ========================== -->

  <main>

    <!-- RESULTS -->

    <div
      id="results"
      class="results"
    ></div>

    <!-- MAPPE -->

    <section class="maps-section">

      <h2>
        Mappe utili
      </h2>

      <div class="utility-grid">

        <a
          class="utility-btn"
          href="images/SDL26_mappa_V_1.png"
          target="_blank"
        >
          🗺️ Mappa completa
        </a>

        <a
          class="utility-btn"
          href="images/SDL26_mappa_V_2.png"
          target="_blank"
        >
          🏛️ Sale e spazi
        </a>

        <a
          class="utility-btn"
          href="images/SDL26_mappa_V_3.png"
          target="_blank"
        >
          ☕ Cibo e punti acqua
        </a>

        <a
          class="utility-btn"
          href="images/SDL26_mappa_V_4.png"
          target="_blank"
        >
          🚻 Servizi igienici
        </a>

        <a
          class="utility-btn"
          href="images/SDL26_mappa_V_5.png"
          target="_blank"
        >
          🛎️ Servizi
        </a>

      </div>

    </section>

  </main>

 <!-- =========================
       FOOTER
  ========================== -->

  <footer class="footer">

    <p>
      Creato da Bibliobohemian per sopravvivere al Salone.
      Se ti ho salvato i piedi, mi lasci un follow? ❤️
    </p>

    <a
      href="https://instagram.com/bibliobohemian"
      target="_blank"
    >
      @bibliobohemian
    </a>

  </footer>

  <script src="script.js"></script>

</body>

</html>
