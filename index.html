<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SalTo Map</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header class="topbar">
    <h1>SalTo Map</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Cerca editore..."
    />
  </header>

  <main>

    <section class="map-wrapper">

      <div class="map-container" id="mapContainer">

        <img
          src="images/pad1.png"
          alt="Padiglione 1"
          class="map-image"
        />

        <svg
  class="map-overlay"
  viewBox="0 0 1557 648"
  preserveAspectRatio="none"
>

          <!-- BAO -->
<rect
  x="401"
  y="397"
  width="67"
  height="35"
  class="stand"
  data-name="BAO Publishing"
  data-stand="B66"
/>

<!-- BECCO GIALLO -->
<rect
  x="703"
  y="365"
  width="68"
  height="35"
  class="stand"
  data-name="Becco Giallo"
  data-stand="C40"
/>

<!-- COCONINO -->
<rect
  x="847"
  y="428"
  width="66"
  height="36"
  class="stand"
  data-name="Coconino Press"
  data-stand="B24"
/>
        </svg>

      </div>

    </section>

  </main>

  <div id="popup" class="popup hidden">
    <h2 id="popupName"></h2>
    <p id="popupStand"></p>
  </div>

  <script src="script.js"></script>

</body>
</html>
