<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    SalTo Map
  </title>

  <style>

    body {
      margin: 0;
      background: #111;
      font-family: sans-serif;
    }

    .map-wrapper {

      position: relative;

      width: fit-content;

      margin: auto;

    }

    .map-image {

      display: block;

      width: 100%;

      max-width: 1400px;

    }

    .map-overlay {

      position: absolute;

      inset: 0;

      width: 100%;
      height: 100%;

    }

    .map-area {

      fill-opacity: 0.25;

      stroke-width: 2;

      cursor: pointer;

      transition: 0.2s;

    }

    .map-area:hover {

      fill-opacity: 0.6;

    }

  </style>

</head>

<body>

  <div class="map-wrapper">

    <img
      class="map-image"
      src="./maps/2026/pad1/map.png"
    >

    <svg
      class="map-overlay"
      viewBox="0 0 1846 811"
    >
    </svg>

  </div>

  <script src="./js/map-engine.js">
  </script>

</body>

</html>
