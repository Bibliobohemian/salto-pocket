<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    SalTo Pocket
  </title>

  <style>

    body {

      margin: 0;

      background:
        #f3efe7;

      font-family:
        sans-serif;

    }

    .topbar {

      padding:
        18px 24px;

      background:
        white;

      box-shadow:
        0 2px 12px rgba(0,0,0,0.08);

      position: sticky;

      top: 0;

      z-index: 50;

    }

    .topbar h1 {

      margin: 0;

      font-size: 24px;

    }

    .legend {

      display: flex;

      gap: 16px;

      padding:
        16px 24px;

      flex-wrap: wrap;

    }

    .legend-item {

      display: flex;

      align-items: center;

      gap: 8px;

    }

    .legend-color {

      width: 16px;
      height: 16px;

      border-radius: 4px;

    }

    .legend-color.stand {
      background: #d97706;
    }

    .legend-color.room {
      background: #2563eb;
    }

    .legend-color.food {
      background: #dc2626;
    }

    .legend-color.wc {
      background: #16a34a;
    }

    .map-wrapper {

      position: relative;

      width: fit-content;

margin:
    24px auto;
    }

    .map-image {

      display: block;

      width: 100%;

      max-width: 1400px;

    }

    .map-overlay {

      position: absolute;

      inset: 0;

      width: 100%;
      height: 100%;

    }

    .map-area {

      fill-opacity: 0.18;

      stroke-width: 2;

      cursor: pointer;

      transition: 0.2s;

    }

    .map-area:hover {

      fill-opacity: 0.645;

    }

    .popup {

      position: fixed;

      left: 50%;
      top: 50%;

      transform:
        translate(-50%, -50%);

      background: #1f1f2e;

      color: white;

      padding: 24px;

      border-radius: 18px;

      width: 320px;

      z-index: 999;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.4);

    }

    .hidden {

      display: none;

    }

    .popup-close {

      position: absolute;

      right: 12px;
      top: 8px;

      background: none;

      border: none;

      color: white;

      font-size: 24px;

      cursor: pointer;

    }

    .popup-name {

      font-size: 24px;

      font-weight: bold;

      margin-bottom: 12px;

    }

    .popup-location {

      font-size: 18px;

      margin-bottom: 8px;

      color: #d1d5db;

    }

    .popup-type {

      text-transform: uppercase;

      font-size: 14px;

      letter-spacing: 1px;

      color: #9ca3af;

    }

    .tooltip {

      position: fixed;

      background: #111827;

      color: white;

      padding:
        8px 12px;

      border-radius: 10px;

      pointer-events: none;

      z-index: 9999;

      font-size: 14px;

    }

  </style>

</head>

<body>

  <header class="topbar">

    <h1>
      SalTo Pocket
    </h1>

  </header>

  <div class="legend">

    <div class="legend-item">
      <span
        class="legend-color stand">
      </span>
      Stand
    </div>

    <div class="legend-item">
      <span
        class="legend-color room">
      </span>
      Sale
    </div>

    <div class="legend-item">
      <span
        class="legend-color food">
      </span>
      Food
    </div>

    <div class="legend-item">
      <span
        class="legend-color wc">
      </span>
      Bagni
    </div>

  </div>

  <div class="map-wrapper">

    <img
      class="map-image"
      src="./maps/2026/pad1/map.png"
    >

    <svg
      class="map-overlay"
      viewBox="0 0 1846 811"
    >
    </svg>

  </div>

  <div class="popup hidden">

    <button class="popup-close">
      ×
    </button>

    <div class="popup-content">

      <div class="popup-name">
      </div>

      <div class="popup-location">
      </div>

      <div class="popup-type">
      </div>

    </div>

  </div>

  <div class="tooltip hidden">
  </div>

  <script src="./js/map-engine.js">
  </script>

</body>

</html>
