<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>SalTo Pocket</title>

  <!-- PWA -->

  <link
    rel="manifest"
    href="manifest.json"
  />

  <meta
    name="theme-color"
    content="#df2b29"
  />

  <link
    rel="apple-touch-icon"
    href="images/icon-192.png"
  />

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />

  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="default"
  />

  <meta
    name="apple-mobile-web-app-title"
    content="SalTo Pocket"
  />

  <!-- STYLE -->

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <!-- =========================
       TOPBAR
  ========================== -->

  <header class="topbar">

    <div class="top-title">

      <div>

        <h1>SalTo Pocket</h1>

        <p>
          Your survival kit for the Salone.
        </p>

      </div>

      <!-- DARK MODE -->

      <button
        id="themeToggle"
        class="theme-toggle"
      >
        🌙
      </button>

    </div>

    <!-- SEARCH -->

    <div class="search-wrapper">

      <input
        type="text"
        id="searchInput"
        placeholder="Cerca editore, stand, categoria..."
      />

      <button
        id="clearSearchBtn"
      >
        ✕
      </button>

    </div>

    <!-- QUICK PADS -->

    <div class="quick-pads">

      <button
        class="quick-btn"
        data-pad="PAD 1"
        onclick="quickSearch('PAD 1', this)"
      >
        PAD 1
      </button>

      <button
        class="quick-btn"
        data-pad="PAD 2"
        onclick="quickSearch('PAD 2', this)"
      >
        PAD 2
      </button>

      <button
        class="quick-btn"
        data-pad="PAD 3"
        onclick="quickSearch('PAD 3', this)"
      >
        PAD 3
      </button>

      <button
        class="quick-btn"
        data-pad="PAD OVAL"
        onclick="quickSearch('PAD OVAL', this)"
      >
        OVAL
      </button>

    </div>

    <!-- FILTERS -->

    <div class="filters">

      <button
        id="allBtn"
        class="filter-btn active"
      >
        Tutti
      </button>

      <button
        id="favoritesBtn"
        class="filter-btn"
      >
        ❤️ Preferiti
      </button>

      <button
        id="visitedBtn"
        class="filter-btn"
      >
        ✅ Visitati
      </button>

    </div>

    <!-- COUNTERS -->

    <div class="counters">

      <div class="counter-card">

        <span id="favoritesCount">
          0
        </span>

        <p>Preferiti</p>

      </div>

      <div class="counter-card">

        <span id="visitedCount">
          0
        </span>

        <p>Visitati</p>

      </div>

    </div>

    <!-- SORT -->

    <div id="sortWrapper">

      <select id="sortSelect">

        <option value="name">
          Ordina: Nome
        </option>

        <option value="stand">
          Ordina: Stand
        </option>

      </select>

    </div>

  </header>

  <!-- =========================
       MAIN
  ========================== -->

  <main>

    <!-- RESULTS -->

    <div
      id="results"
      class="results"
    ></div>

    <!-- MAPPE -->

    <section class="maps-section">

      <h2>
        Mappe utili
      </h2>

      <div class="utility-grid">

        <button
          class="utility-btn"
          onclick="openMap(
            'images/SDL26_mappa_V_1.png'
          )"
        >
          🗺️ Mappa completa
        </button>

        <button
          class="utility-btn"
          onclick="openMap(
            'images/SDL26_mappa_V_2.png'
          )"
        >
          🏛️ Sale e spazi
        </button>

        <button
          class="utility-btn"
          onclick="openMap(
            'images/SDL26_mappa_V_3.png'
          )"
        >
          ☕ Cibo e punti acqua
        </button>

        <button
          class="utility-btn"
          onclick="openMap(
            'images/SDL26_mappa_V_4.png'
          )"
        >
          🚻 Servizi igienici
        </button>

        <button
          class="utility-btn"
          onclick="openMap(
            'images/SDL26_mappa_V_5.png'
          )"
        >
          🛎️ Servizi
        </button>

      </div>

    </section>

  </main>

  <!-- =========================
       MAP MODAL
  ========================== -->

  <div
    id="mapModal"
    class="map-modal"
  >

    <button
      id="closeMapBtn"
      class="close-map-btn"
    >
      ✕
    </button>

    <img
      id="mapImage"
      src=""
      alt="Mappa"
    />

  </div>

  <!-- =========================
       FOOTER
  ========================== -->

  <footer class="footer">

    <p>
      Creato da Bibliobohemian
      per sopravvivere al Salone.
    </p>

    <a
      href="https://instagram.com/bibliobohemian"
      target="_blank"
    >
      @bibliobohemian
    </a>

  </footer>

  <!-- SCRIPT -->

  <script src="script.js"></script>

</body>

</html>
