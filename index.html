<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>SalTo Map</title>

  <link rel="stylesheet" href="style.css" />

</head>

<body>

  <header class="topbar">

    <h1>SalTo Map</h1>

    <input
      type="text"
      id="searchInput"
      placeholder="Cerca editore, stand o padiglione..."
    />

    <!-- TOP FILTERS -->

    <div class="filters">

      <button
        id="allBtn"
        class="filter-btn active"
      >
        Tutti
      </button>

      <button
        id="favoritesBtn"
        class="filter-btn"
      >
        ❤️ Preferiti
      </button>

    </div>

  </header>

  <main>

    <div
      id="results"
      class="results"
    ></div>

  </main>

  <script src="script.js"></script>

</body>

</html>
