<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    SalTo Pocket
  </title>

  <style>

    body {

      margin: 0;

      background:
        #f3efe7;

      font-family:
        sans-serif;

    }

    .topbar {

      padding:
        18px 24px;

      background:
        white;

      box-shadow:
        0 2px 12px rgba(0,0,0,0.08);

      position: sticky;

      top: 0;

      z-index: 50;

    }

    .topbar h1 {

      margin: 0;

      font-size: 24px;

    }

    .legend {

      display: flex;

      gap: 16px;

      padding:
        16px 24px;

      flex-wrap: wrap;

    }

    .legend-item {

      display: flex;

      align-items: center;

      gap: 8px;

    }

    .legend-color {

      width: 16px;

      height: 16px;

      border-radius: 4px;

    }

    .legend-color.stand {
      background: #d97706;
    }

    .legend-color.room {
      background: #2563eb;
    }

    .legend-color.food {
      background: #dc2626;
    }

    .legend-color.wc {
      background: #16a34a;
    }

    .legend-color.smoking {
      background: #6b7280;
    }

    .legend-color.kids {
      background: #ec4899;
    }

    .legend-color.info {
      background: #06b6d4;
    }

    .legend-color.entrance {
      background: #facc15;
    }

    .legend-color.service {
      background: #7c3aed;
    }

    .map-wrapper {

      position: relative;

      display: inline-block;

      max-width: 100%;

      margin:
        24px auto;

    }

    .map-container {

      text-align: center;

    }

    .map-image {

      display: block;

      width: 100%;

      max-width: 1400px;

      height: auto;

    }

    .map-overlay {

      position: absolute;

      inset: 0;

      width: 100%;

      height: 100%;

    }

    .map-area {

      fill-opacity: 0.18;

      stroke-width: 2;

      cursor: pointer;

      transition:
        fill-opacity 0.2s,
        stroke-width 0.2s,
        filter 0.2s;

    }

    .map-area:hover {

      fill-opacity: 0.45;

    }

    .map-area.active {

      fill-opacity: 0.38 !important;

      stroke: #ffffff;

      stroke-width: 3;

      filter:
        drop-shadow(
          0 0 8px rgba(255,255,255,0.7)
        );

      animation:
        pulseArea 1.8s infinite;

    }

    @keyframes pulseArea {

      0% {

        fill-opacity: 0.28;

      }

      50% {

        fill-opacity: 0.45;

      }

      100% {

        fill-opacity: 0.28;

      }

    }

    .popup-backdrop {

      position: fixed;

      inset: 0;

      background:
        rgba(0,0,0,0.45);

      z-index: 998;

    }

    .popup {

      position: fixed;

      left: 50%;

      top: 50%;

      transform:
        translate(-50%, -50%);

      background:
        #1f1f2e;

      color:
        white;

      padding:
        24px;

      border-radius:
        18px;

      width:
        min(320px, 90vw);

      z-index: 999;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.4);

    }

    .hidden {

      display: none;

    }

    .popup-close {

      position: absolute;

      right: 12px;

      top: 8px;

      background: none;

      border: none;

      color: white;

      font-size: 24px;

      cursor: pointer;

    }

    .popup-name {

      font-size: 24px;

      font-weight: bold;

      margin-bottom: 12px;

    }

    .popup-location {

      font-size: 18px;

      margin-bottom: 8px;

      color: #d1d5db;

    }

    .popup-type {

      text-transform: uppercase;

      font-size: 14px;

      letter-spacing: 1px;

      color: #9ca3af;

    }

    .tooltip {

      position: fixed;

      background:
        #111827;

      color:
        white;

      padding:
        8px 12px;

      border-radius:
        10px;

      pointer-events: none;

      z-index: 9999;

      font-size: 14px;

    }

    @media (max-width: 768px) {

      .legend {

        gap: 12px;

        padding:
          12px 16px;

        font-size: 14px;

      }

      .popup {

        padding: 20px;

      }

      .popup-name {

        font-size: 20px;

      }

      .popup-location {

        font-size: 16px;

      }

    }

    .map-search {

  padding:
    16px 24px;

  background:
    white;

  position: sticky;

  top: 72px;

  z-index: 40;

  box-shadow:
    0 2px 8px rgba(0,0,0,0.04);

}

.map-search-input {

  width: 100%;

  max-width: 500px;

  padding:
    14px 18px;

  border-radius:
    14px;

  border:
    1px solid #d1d5db;

  font-size:
    16px;

  outline: none;

  box-sizing:
    border-box;

}

.map-search-input:focus {

  border-color:
    #d97706;

}

  </style>

</head>

<body>

  <header class="topbar">

    <h1>
      SalTo Pocket
    </h1>

  </header>

  <div class="map-search">

  <input
    type="text"
    class="map-search-input"
    placeholder="Cerca stand..."
  >

</div>

  <div class="legend">

    <div class="legend-item">
      <span class="legend-color stand"></span>
      Stand
    </div>

    <div class="legend-item">
      <span class="legend-color room"></span>
      Sale
    </div>

    <div class="legend-item">
      <span class="legend-color food"></span>
      Food
    </div>

    <div class="legend-item">
      <span class="legend-color wc"></span>
      Bagni
    </div>

    <div class="legend-item">
      <span class="legend-color smoking"></span>
      Area fumatori
    </div>

    <div class="legend-item">
      <span class="legend-color kids"></span>
      Area bambini
    </div>

    <div class="legend-item">
      <span class="legend-color info"></span>
      Infopoint
    </div>

    <div class="legend-item">
      <span class="legend-color entrance"></span>
      Ingresso
    </div>

    <div class="legend-item">
      <span class="legend-color service"></span>
      Servizi
    </div>

  </div>

  <div class="map-container">

    <div class="map-wrapper">

      <img
        class="map-image"
        src="./maps/2026/pad1/map.png"
      >

      <svg
        class="map-overlay"
        viewBox="0 0 1846 811"
      >
      </svg>

    </div>

  </div>

  <div class="popup-backdrop hidden">
  </div>

  <div class="popup hidden">

    <button class="popup-close">
      ×
    </button>

    <div class="popup-content">

      <div class="popup-name">
      </div>

      <div class="popup-location">
      </div>

      <div class="popup-type">
      </div>

    </div>

  </div>

  <div class="tooltip hidden">
  </div>

  <script src="./js/map-engine.js">
  </script>

</body>

</html>
