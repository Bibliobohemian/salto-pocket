<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">

<meta
  name="viewport"
  content="
    width=device-width,
    initial-scale=1.0
  "
>

  <title>
    SalTo Pocket
  </title>

  <style>

    body {

      margin: 0;

      background:
        #f3efe7;

      font-family:
        sans-serif;

      overflow-x: hidden;

    }

    .topbar {

      position: sticky;

      top: 0;

      z-index: 1000;

      background:
        rgba(255,255,255,0.96);

      backdrop-filter:
        blur(10px);

      box-shadow:
        0 2px 12px rgba(0,0,0,0.08);

    }

    .topbar-inner {

      display: flex;

      flex-direction: column;

      gap: 14px;

      padding:
        16px;

    }

    .topbar-title {

      display: flex;

      align-items: center;

      justify-content: space-between;

    }

    .topbar h1 {

      margin: 0;

      font-size: 28px;

    }

    .map-search-input {
  width: 100%;
  padding:
    14px 48px 14px 18px;
      border-radius:
        14px;
      border:
        1px solid #d1d5db;
      font-size:
        16px;
      outline: none;
      box-sizing:
        border-box;
      background:
        #fafafa;
    }

.search-wrapper {

  position: relative;

  width: 100%;

}

.search-clear {

  position: absolute;

  right: 12px;

  top: 50%;

  transform:
    translateY(-50%);

  width: 32px;

  height: 32px;

  border: none;

  border-radius: 50%;

  background:
    #e5e7eb;

  color:
    #374151;

  cursor: pointer;

  font-size: 18px;

  display: flex;

  align-items: center;

  justify-content: center;

}

.search-clear:hover {

  background:
    #d1d5db;

}

.map-filters {

  display: inline-flex;

  gap: 10px;

  margin-right: 16px;

}

.filters-header {

  display: flex;

  align-items: center;

  gap: 12px;

  flex-wrap: wrap;

  position: relative;

  z-index: 1001;

}

.filters-label {

  color: #6b7280;

  font-size: 14px;

  font-weight: 600;

}

.map-filter-btn {

  border: none;

  border-radius: 12px;

  padding: 10px 14px;

  cursor: pointer;

  background: #f3f4f6;

  font-size: 14px;

}

.map-filter-btn.active {

  background: #d97706;

  color: white;

}
    
    .map-search-input:focus {

      border-color:
        #d97706;

      background:
        white;

    }

.legend {

  display: flex;

  gap: 10px;

  overflow-x: auto;

  padding-bottom: 4px;

  scrollbar-width: none;

  -ms-overflow-style: none;

  position: relative;
z-index: 1;

}

.legend::-webkit-scrollbar {

  display: none;

}

    .legend-item {

      display: flex;

      align-items: center;

      gap: 8px;

      flex-shrink: 0;

      padding:
        10px 14px;

      border-radius:
        999px;

      background:
        #f3f4f6;

      cursor: pointer;

      transition:
        opacity 0.2s,
        transform 0.2s,
        background 0.2s;

      user-select: none;

      font-size: 14px;

    }

    .legend-item:hover {

      transform:
        translateY(-1px);

    }

    .legend-item.inactive {

      opacity: 0.35;

    }

    .legend-color {

      width: 14px;

      height: 14px;

      border-radius: 999px;

      flex-shrink: 0;

    }

    .legend-color.stand {
      background: #d97706;
    }

    .legend-color.room {
      background: #2563eb;
    }

    .legend-color.food {
      background: #dc2626;
    }

    .legend-color.wc {
      background: #16a34a;
    }

    .legend-color.smoking {
      background: #6b7280;
    }

    .legend-color.kids {
      background: #ec4899;
    }

    .legend-color.info {
      background: #06b6d4;
    }

    .legend-color.entrance {
      background: #facc15;
    }

    .legend-color.water {
      background: #0ea5e9;
    }

    .legend-color.landmark {
      background: #f97316;
    }

.map-container {

  position: relative;

  overflow: hidden;

  width: 100%;

}

    .map-viewport {

  width: 100%;

  height: 100%;

  overflow: hidden;

  touch-action: none;

}

    .map-wrapper {
      position: relative;
      display: inline-block;
      max-width: 100%;
      margin:
        24px auto;
      touch-action: pan-x pan-y;
    }

    .map-image {

      display: block;

      width: 100%;

      max-width: 1400px;

      height: auto;

      transition:
        opacity 0.2s,
        filter 0.2s;

    }

    .map-image.dimmed {
opacity: 0.9;
filter: none;

    }

    .map-overlay {

      position: absolute;

      inset: 0;

      width: 100%;

      height: 100%;

    }

    .map-area {

      fill-opacity: 0.18;

      stroke-width: 2;

      cursor: pointer;

      transition:
        fill-opacity 0.2s,
        stroke-width 0.2s,
        filter 0.2s,
        stroke-opacity 0.2s;

    }

    .map-area:hover {

      fill-opacity: 0.45;

    }

.map-area.active {

  fill-opacity:
    0.60 !important;

  stroke:
    #ffffff;

  stroke-width:
    5;

  filter:
    drop-shadow(
      0 0 18px rgba(255,255,255,0.95)
    );

  animation:
    pulseArea 1.4s infinite;

}

    .map-area.dimmed {

      fill-opacity: 0.08 !important;

      stroke-opacity: 0.12 !important;

    }

@keyframes pulseArea {

  0% {

    fill-opacity:
      0.35;

  }

  50% {

    fill-opacity:
      0.75;

  }

  100% {

    fill-opacity:
      0.35;

  }

}
    .popup-backdrop {

      position: fixed;

      inset: 0;

      background:
        rgba(0,0,0,0.35);

      z-index: 998;

    }

    .popup {

      position: fixed;

      left: 50%;

      top: 50%;

      transform:
        translate(-50%, -50%);

      background:
        #1f1f2e;

      color:
        white;

      padding:
        24px;

      border-radius:
        18px;

      width:
        min(340px, 90vw);

      z-index: 999;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.4);

      transition:
        transform 0.25s ease;

    }

.hidden {

  display: none !important;

}

    .popup-close {

      position: absolute;

      right: 12px;

      top: 8px;

      background: none;

      border: none;

      color: white;

      font-size: 24px;

      cursor: pointer;

    }

    .popup-name {

      font-size: 24px;

      font-weight: bold;

      margin-bottom: 12px;

    }

    .popup-location {

      font-size: 18px;

      margin-bottom: 8px;

      color: #d1d5db;

    }

    .popup-type {

      text-transform: uppercase;

      font-size: 14px;

      letter-spacing: 1px;

      color: #9ca3af;

    }

    .tooltip {

      position: fixed;

      background:
        #111827;

      color:
        white;

      padding:
        8px 12px;

      border-radius:
        10px;

      pointer-events: none;

      z-index: 9999;

      font-size: 14px;

    }

    .popup-actions {

  display: flex;

  gap: 10px;

  margin-top: 20px;

}

.popup-favorite-btn,
.popup-visited-btn {

  flex: 1;

  border: none;

  border-radius: 12px;

  padding:
    12px;

  cursor: pointer;

  font-size: 14px;

  font-weight: 600;

}

.popup-favorite-btn {

  background:
    #ec4899;

  color:
    white;

}

.popup-visited-btn {

  background:
    #10b981;

  color:
    white;

}

    @media (max-width: 768px) {
      body {
        padding-bottom: 140px;
      }

.map-wrapper {

  width: 100%;

  max-width: 100%;

}
      
.topbar-inner {

  padding:
    10px 12px;

  gap: 10px;

}

      .topbar h1 {

        font-size: 18px;

      }

.legend-item {

  padding:
    6px 10px;

  font-size: 12px;

}

      .map-wrapper {

        margin:
          16px auto;

      }

     .popup {

  left: 0;

  right: 0;

  top: auto;

  bottom: 0;

  width: 100%;

  max-width: 100%;

  min-height: 180px;

  border-radius:
    24px 24px 0 0;

  transform:
    translateY(0);

  padding:
    20px;

  box-sizing:
    border-box;

}

      .popup-name {

        font-size: 20px;

      }

      .popup-location {

        font-size: 16px;

      }

      .tooltip {

        display: none;

      }

    }

  </style>

</head>

<body>

  <header class="topbar">

    <div class="topbar-inner">

      <div class="topbar-title">

        <h1>
          SalTo Pocket
        </h1>

      </div>

<div class="search-wrapper">

  <input
    type="text"
    class="map-search-input"
    placeholder="Cerca stand..."
  >

  <button
    class="search-clear hidden"
  >
    ×
  </button>

</div>

<div class="filters-header">

  <div class="map-filters">

    <button class="map-filter-btn" data-filter="favorites">
      ❤️ Preferiti
    </button>

    <button class="map-filter-btn" data-filter="missions">
      🎯 Missioni
    </button>

  </div>

  <div class="filters-label">
    | Filtra la mappa:
  </div>

</div>

<div class="legend">

        <div
          class="legend-item"
          data-type="stand"
        >
          <span class="legend-color stand"></span>
          Stand
        </div>

        <div
          class="legend-item"
          data-type="room"
        >
          <span class="legend-color room"></span>
          Sale
        </div>

        <div
          class="legend-item"
          data-type="food"
        >
          <span class="legend-color food"></span>
          Food
        </div>

        <div
          class="legend-item"
          data-type="wc"
        >
          <span class="legend-color wc"></span>
          Bagni
        </div>

        <div
          class="legend-item"
          data-type="smoking"
        >
          <span class="legend-color smoking"></span>
          Fumatori
        </div>

        <div
          class="legend-item"
          data-type="kids"
        >
          <span class="legend-color kids"></span>
          Bambini
        </div>

        <div
          class="legend-item"
          data-type="info"
        >
          <span class="legend-color info"></span>
          Info
        </div>

        <div
          class="legend-item"
          data-type="entrance"
        >
          <span class="legend-color entrance"></span>
          Ingressi
        </div>

        <div
          class="legend-item"
          data-type="water"
        >
          <span class="legend-color water"></span>
          Acqua
        </div>

        <div
          class="legend-item"
          data-type="landmark"
        >
          <span class="legend-color landmark"></span>
          Landmark
        </div>

      </div>

    </div>

  </header>

<div class="map-container">

  <div class="map-viewport">

    <div class="map-wrapper">

      <img
        class="map-image"
        src="./maps/2026/pad1/map.png"
      >

      <svg
        class="map-overlay"
        viewBox="0 0 1846 811"
      >
</svg>

    </div>

  </div>

</div>

  <div class="popup-backdrop hidden">
  </div>

  <div class="popup hidden">

    <button class="popup-close">
      ×
    </button>

    <div class="popup-content">

      <div class="popup-name">
      </div>

      <div class="popup-location">
      </div>

      <div class="popup-type">
      </div>

<div
  class="popup-actions hidden"
>

  <button
    class="popup-favorite-btn"
  >
    🤍 Preferito
  </button>

  <button
    class="popup-visited-btn"
  >
    ✅ Visitato
  </button>

</div>
      
    </div>

  </div>

  <div class="tooltip hidden">
  </div>

<script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

<script src="./js/map-engine.js">
</script>

</body>

</html>
