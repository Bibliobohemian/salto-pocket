<!DOCTYPE html>
<html lang="it">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0
    "
  >

  <title>
    SalTo Pocket
  </title>

  <style>

    body {
      margin: 0;
      background: #111;
      font-family: sans-serif;
    }

    .map-wrapper {

      position: relative;

      width: fit-content;

      margin: auto;

    }

    .map-image {

      display: block;

      width: 100%;

      max-width: 1400px;

    }

    .map-overlay {

      position: absolute;

      inset: 0;

      width: 100%;
      height: 100%;

    }

    .map-area {

      fill-opacity: 0.25;

      stroke-width: 2;

      cursor: pointer;

      transition: 0.2s;

    }

    .map-area:hover {

      fill-opacity: 0.6;

    }

    .popup {

  position: fixed;

  left: 50%;
  top: 50%;

  transform:
    translate(-50%, -50%);

  background: #1f1f2e;

  color: white;

  padding: 24px;

  border-radius: 18px;

  width: 320px;

  z-index: 999;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.4);

}

.hidden {

  display: none;

}

.popup-close {

  position: absolute;

  right: 12px;
  top: 8px;

  background: none;

  border: none;

  color: white;

  font-size: 24px;

  cursor: pointer;

}

.popup-name {

  font-size: 24px;

  font-weight: bold;

  margin-bottom: 12px;

}

.popup-location {

  font-size: 18px;

  margin-bottom: 8px;

  color: #d1d5db;

}

.popup-type {

  text-transform: uppercase;

  font-size: 14px;

  letter-spacing: 1px;

  color: #9ca3af;

}

  </style>

</head>

<body>

  <div class="map-wrapper">

    <img
      class="map-image"
      src="./maps/2026/pad1/map.png"
    >

    <svg
      class="map-overlay"
      viewBox="0 0 1846 811"
    >
    </svg>

  </div>

<div class="popup hidden">

  <button class="popup-close">
    ×
  </button>

  <div class="popup-content">

    <div class="popup-name">
    </div>

    <div class="popup-location">
    </div>

    <div class="popup-type">
    </div>

  </div>

</div>
  
  <script src="./js/map-engine.js">
  </script>

</body>

</html>
